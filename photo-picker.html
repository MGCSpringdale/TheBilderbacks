<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photo Picker — The Bilderbacks</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #1a1410; color: #f0ebe3; min-height: 100vh; }

    .header { background: #2b2018; padding: 20px 24px; border-bottom: 1px solid #3d2f22; position: sticky; top: 0; z-index: 100; display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }
    .header h1 { font-size: 18px; font-weight: 600; color: #f0ebe3; }
    .header p  { font-size: 13px; color: #a08060; }
    .filter-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .filter-btn { padding: 5px 12px; border-radius: 20px; border: 1px solid #3d2f22; background: transparent; color: #a08060; cursor: pointer; font-size: 12px; font-weight: 600; transition: all .15s; }
    .filter-btn:hover, .filter-btn.active { background: #c0724a; border-color: #c0724a; color: #fff; }

    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 8px; padding: 16px; }

    .thumb-wrap { position: relative; border-radius: 8px; overflow: hidden; aspect-ratio: 3/2; cursor: pointer; border: 2px solid transparent; transition: border-color .15s, transform .15s; }
    .thumb-wrap:hover { border-color: #c0724a; transform: scale(1.02); }
    .thumb-wrap.in-use { border-color: #b09040; }
    .thumb-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .thumb-label { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,.7); font-size: 10px; padding: 4px 6px; color: #d0c0a0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .thumb-badge { position: absolute; top: 5px; left: 5px; background: #b09040; color: #fff; font-size: 9px; font-weight: 700; letter-spacing: .05em; padding: 2px 5px; border-radius: 4px; text-transform: uppercase; max-width: 90%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* Lightbox */
    .lb { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.92); z-index: 999; align-items: center; justify-content: center; flex-direction: column; gap: 16px; padding: 20px; }
    .lb.open { display: flex; }
    .lb img { max-width: 90vw; max-height: 80vh; border-radius: 10px; object-fit: contain; }
    .lb-info { text-align: center; }
    .lb-name { font-size: 20px; font-weight: 600; color: #f0ebe3; margin-bottom: 6px; }
    .lb-usage { font-size: 13px; color: #b09040; margin-bottom: 12px; }
    .lb-close { position: absolute; top: 16px; right: 20px; font-size: 28px; cursor: pointer; color: #a08060; background: none; border: none; }
    .lb-copy { background: #c0724a; color: #fff; border: none; padding: 8px 18px; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; }
    .lb-copy:hover { background: #a05830; }
    .copied { background: #406040 !important; }

    .count { font-size: 12px; color: #806050; margin-left: auto; }
  </style>
</head>
<body>

<div class="header">
  <div>
    <h1>📷 Photo Picker — The Bilderbacks</h1>
    <p>Click any photo to enlarge. Gold border = currently in use on the site.</p>
  </div>
  <div class="filter-row">
    <button class="filter-btn active" onclick="filter('all')">All photos</button>
    <button class="filter-btn" onclick="filter('inuse')">In use</button>
    <button class="filter-btn" onclick="filter('unused')">Not yet used</button>
  </div>
  <span class="count" id="count"></span>
</div>

<div class="grid" id="grid"></div>

<!-- Lightbox -->
<div class="lb" id="lb" onclick="closeLb(event)">
  <button class="lb-close" onclick="closeLb()">✕</button>
  <img id="lb-img" src="" alt="">
  <div class="lb-info">
    <div class="lb-name" id="lb-name"></div>
    <div class="lb-usage" id="lb-usage"></div>
    <button class="lb-copy" id="lb-copy" onclick="copyName()">Copy filename</button>
  </div>
</div>

let currentFilter = 'all';

function filter(type) {
  currentFilter = type;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  render();
}

function render() {
  const grid = document.getElementById('grid');
  const visible = files.filter(f => {
    if (currentFilter === 'inuse') return inUse[f];
    if (currentFilter === 'unused') return !inUse[f];
    return true;
  });
  const namedVisible = namedFiles.filter(f => {
    if (currentFilter === 'inuse') return inUse[f.name];
    if (currentFilter === 'unused') return !inUse[f.name];
    return true;
  });
  document.getElementById('count').textContent = (visible.length + namedVisible.length) + ' photos';

  let html = '';
  if (namedVisible.length) {
    html += `<div style="grid-column:1/-1; font-size:11px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:#b09040; padding:4px 0 0;">Named photos</div>`;
    html += namedVisible.map(f => {
      const used = inUse[f.name];
      return `<div class="thumb-wrap ${used ? 'in-use' : ''}" onclick="openLbNamed('${f.name}','${f.label}')">
        <img src="${f.name}" alt="${f.label}" loading="lazy">
        ${used ? `<div class="thumb-badge">${used}</div>` : ''}
        <div class="thumb-label">${f.label}</div>
      </div>`;
    }).join('');
    html += `<div style="grid-column:1/-1; font-size:11px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:#806050; padding:8px 0 0;">All photos (${visible.length})</div>`;
  }

  html += visible.map(f => {
    const used = inUse[f];
    return `<div class="thumb-wrap ${used ? 'in-use' : ''}" onclick="openLb('${f}')">
      <img src="Images/Highlights/${f}" alt="${f}" loading="lazy">
      ${used ? `<div class="thumb-badge">${used}</div>` : ''}
      <div class="thumb-label">${f}</div>
    </div>`;
  }).join('');

  grid.innerHTML = html;
}

function openLb(f) {
  const used = inUse[f];
  document.getElementById('lb-img').src = 'Images/Highlights/' + f;
  document.getElementById('lb-name').textContent = f;
  document.getElementById('lb-usage').textContent = used ? '⭐ Currently used: ' + used : 'Not yet used on the site';
  const btn = document.getElementById('lb-copy');
  btn.textContent = 'Copy filename';
  btn.classList.remove('copied');
  btn.dataset.name = f;
  document.getElementById('lb').classList.add('open');
}

function openLbNamed(name, label) {
  const used = inUse[name];
  document.getElementById('lb-img').src = name;
  document.getElementById('lb-name').textContent = label + ' (' + name + ')';
  document.getElementById('lb-usage').textContent = used ? '⭐ Currently used: ' + used : 'Not yet used on the site';
  const btn = document.getElementById('lb-copy');
  btn.textContent = 'Copy filename';
  btn.classList.remove('copied');
  btn.dataset.name = name;
  document.getElementById('lb').classList.add('open');
}

function closeLb(e) {
  if (!e || e.target === document.getElementById('lb') || e.target.classList.contains('lb-close')) {
    document.getElementById('lb').classList.remove('open');
  }
}

function copyName() {
  const btn = document.getElementById('lb-copy');
  navigator.clipboard.writeText(btn.dataset.name).then(() => {
    btn.textContent = '✓ Copied!';
    btn.classList.add('copied');
  });
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') document.getElementById('lb').classList.remove('open'); });

render();
</script>
</body>
</html>
